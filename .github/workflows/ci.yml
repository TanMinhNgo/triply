name: CI

on:
  push:

jobs:
  checks:
    name: Format, lint, typecheck, and build
    runs-on: ubuntu-latest

    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo dependency versions
        run: npx expo install --check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
